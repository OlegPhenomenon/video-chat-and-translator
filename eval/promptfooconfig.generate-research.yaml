# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Eval generate_research.md — генерация research.md из brief (3 кейса × 3 модели)"

prompts:
  - file://prompts/generate_research.md

providers:
  - id: "exec: ./providers/claude-sonnet-retry.sh"
    label: claude-sonnet

tests:
  # ─────────────────────────────────────────────────
  # УРОВЕНЬ 1: структура (все секции присутствуют)
  # ─────────────────────────────────────────────────

  - description: "01. Simple brief — все 7 обязательных секций присутствуют"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: contains
        value: "## 1."
      - type: contains
        value: "## 2."
      - type: contains
        value: "## 3."
      - type: contains
        value: "## 4."
      - type: contains
        value: "## 5."
      - type: contains
        value: "## 6."
      - type: contains
        value: "## 7."

  # ─────────────────────────────────────────────────
  # УРОВЕНЬ 2: анализ альтернатив (≥2 варианта)
  # ─────────────────────────────────────────────────

  - description: "02. Simple brief — альтернативы содержат ≥2 варианта с Плюсы/Минусы"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const m = output.match(/## 2[\s\S]*?(?=\n## 3|$)/);
          if (!m) throw new Error('Секция "## 2. Анализ альтернатив" не найдена');
          const text = m[0];
          const hasVariants = /(вариант|variant|подход|option|в[аa]риант\s*[A-Za-zА-Яа-я0-9])/gi.test(text);
          if (!hasVariants) throw new Error('Нет явных вариантов (A, B, C или Вариант 1, 2)');
          const hasPros = /(плюс|pro|преимуществ)/i.test(text);
          const hasCons = /(минус|con|недостат)/i.test(text);
          if (!hasPros || !hasCons) throw new Error('Нет Плюсов/Минусов у альтернатив');
          return true;

  # ─────────────────────────────────────────────────
  # УРОВЕНЬ 3: рекомендация обоснована
  # ─────────────────────────────────────────────────

  - description: "03. Simple brief — есть явная рекомендация с обоснованием"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const hasRec = /(рекоменду|recommended|выбран|chosen|итог|вывод|выбор)/i.test(output);
          if (!hasRec) throw new Error('Нет явной рекомендации');
          return true;

  # ─────────────────────────────────────────────────
  # УРОВЕНЬ 4: конкретика (ссылки на файлы/гемы/маршруты)
  # ─────────────────────────────────────────────────

  - description: "04. Simple brief — дизайн содержит конкретные файлы/маршруты/компоненты"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const hasFiles = /app\/(controllers|models|frontend|views)\//i.test(output);
          const hasRoutes = /(GET|POST|PATCH|PUT|DELETE)\s+\//i.test(output);
          const hasGems = /(devise|sidekiq|redis|rspec|inertia|tailwind)/i.test(output);
          if (!hasFiles && !hasRoutes) throw new Error('Нет конкретных файлов или маршрутов в дизайне');
          return true;

  # ─────────────────────────────────────────────────
  # УРОВЕНЬ 5: риски (таблица или список с конкретными сценариями)
  # ─────────────────────────────────────────────────

  - description: "05. Complex brief — риски содержат конкретные сценарии, не общие слова"
    vars:
      brief_doc: file://fixtures/research-brief-complex.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const m = output.match(/## 3[\s\S]*?(?=\n## 4|$)/);
          if (!m) throw new Error('Секция "## 3. Анализ узких мест и рисков" не найдена');
          const text = m[0];
          // Проверяем что риски конкретные (упоминают технологии, лимиты, сценарии)
          const concrete = /(quota|IndexedDB|localStorage|base64|память|memory|blob|File|размер|size|лимит|limit|ошибка|error|fallback)/i.test(text);
          if (!concrete) throw new Error('Риски слишком общие — нет конкретных технологий/сценариев');
          return true;

  # ─────────────────────────────────────────────────
  # УРОВЕНЬ 6: sparse brief — research отмечает недостаток информации
  # ─────────────────────────────────────────────────

  - description: "06. Sparse brief — research отмечает недостаток информации или заполняет TBD"
    vars:
      brief_doc: file://fixtures/research-brief-sparse.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          // При мусорном brief research должен либо отметить недостаток инфо,
          // либо заполнить TBD, либо запросить уточнения.
          // НЕ должен галлюцинировать сложную архитектуру без основания.
          const hasTBD = /TBD/i.test(output);
          const hasNote = /(недостаточ|уточн|требует|не хватает|нет данных|не указан|неопредел|sparse|limited information)/i.test(output);
          const isShort = output.length < 3000; // Если мусорный brief — research не должен быть на 500 строк
          if (!hasTBD && !hasNote && !isShort) throw new Error('Research не отметил недостаток информации в мусорном brief — возможна галлюцинация');
          return true;
