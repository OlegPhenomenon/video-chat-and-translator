# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

description: "Eval generate_research.md — opus with retry"

prompts:
  - file://prompts/generate_research.md

providers:
  - id: "exec: ./providers/claude-opus-retry.sh"
    label: claude-opus

tests:
  - description: "01. Simple brief — все 7 секций"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: contains
        value: "## 1."
      - type: contains
        value: "## 2."
      - type: contains
        value: "## 3."
      - type: contains
        value: "## 4."
      - type: contains
        value: "## 5."
      - type: contains
        value: "## 6."
      - type: contains
        value: "## 7."

  - description: "02. Simple brief — альтернативы ≥2 варианта"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const m = output.match(/## 2[\s\S]*?(?=\n## 3|$)/);
          if (!m) throw new Error('Секция "## 2" не найдена');
          const text = m[0];
          const hasVariants = /(вариант|variant|подход|option|альтернатива)/gi.test(text);
          if (!hasVariants) throw new Error('Нет явных вариантов');
          const hasPros = /(плюс|pro|преимуществ)/i.test(text);
          const hasCons = /(минус|con|недостат)/i.test(text);
          if (!hasPros || !hasCons) throw new Error('Нет Плюсов/Минусов');
          return true;

  - description: "03. Simple brief — рекомендация с обоснованием"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const hasRec = /(рекоменду|recommended|выбран|chosen|итог|вывод)/i.test(output);
          if (!hasRec) throw new Error('Нет рекомендации');
          return true;

  - description: "04. Simple brief — конкретные файлы/маршруты"
    vars:
      brief_doc: file://fixtures/research-brief-simple.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const hasFiles = /app\/(controllers|models|frontend|views)\//i.test(output);
          const hasRoutes = /(GET|POST|PATCH|PUT|DELETE)\s+\//i.test(output);
          if (!hasFiles && !hasRoutes) throw new Error('Нет конкретных файлов или маршрутов');
          return true;

  - description: "05. Complex brief — конкретные риски"
    vars:
      brief_doc: file://fixtures/research-brief-complex.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const m = output.match(/## 3[\s\S]*?(?=\n## 4|$)/);
          if (!m) throw new Error('Секция "## 3" не найдена');
          const text = m[0];
          const concrete = /(quota|IndexedDB|localStorage|base64|память|memory|blob|File|размер|size|лимит|limit|ошибка|error|fallback)/i.test(text);
          if (!concrete) throw new Error('Риски слишком общие');
          return true;

  - description: "06. Sparse brief — отмечает недостаток информации"
    vars:
      brief_doc: file://fixtures/research-brief-sparse.md
      project_context: file://fixtures/research-project-context.md
    assert:
      - type: javascript
        value: |
          const hasTBD = /TBD/i.test(output);
          const hasNote = /(недостаточ|уточн|требует|не хватает|нет данных|не указан|неопредел|sparse|limited information)/i.test(output);
          const isShort = output.length < 3000;
          if (!hasTBD && !hasNote && !isShort) throw new Error('Research не отметил недостаток информации');
          return true;
